<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Throttle</title>
    
</head>
<body>
    <div id="box-container">
        <div id="box" style="background-color:pink ; height: 930px; width: 230px; border: 2px solid black">
        </div>
    </div>

    <script>
        const position = document.createElement("h3")
        document.body.appendChild(position)
        
        let timer;
        window.addEventListener("scroll", ()=> {
            if(!timer){
                Throttle();
            }
        })
        function Throttle(){
                timer =setTimeout(()=> {
                console.log(window.scrollY);
                scrollValue = window.scrollY;
                position.textContent = scrollValue;
                timer = '';
               }  ,500)
            }
            

    </script>
</body>

</html>
