<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom event emitter</title>

</head>
<body>
    <div class="todo-box"></div>
    <div class="input-area">
        <span>
        <input class="input-box" style="padding: 10px; border: 2px solid black" placeholder="Add your todo"/>
        <button onclick="handleAddTodo()" style="padding: 10px; border: none; background-color: hotpink;"> Add todo</button>
        </span>
    </div>


    <script>
        const listeners = {
            messageSent: [],
            todoAdded: [],
            colorChange: []
        }

        class EventEmitter{
            on( eventName, func ){
                    listeners[eventName].push(func)
                }
                 
            emit(eventName, data){
                let funcs = listeners[eventName]
                funcs.forEach( (func) => {
                    func(data)
                });
            }
            once(eventName, func ){
                function wrapper(data){
                    func(data)
                    let index = listeners[eventName].indexOf(wrapper);
                    listeners[eventName].splice(index, 1)

                }
                 listeners[eventName].push(wrapper)
                }
            }

        const emitter = new EventEmitter();
        emitter.on("messageSent", (msg)=> {
            console.log( "Listener 1 got the message:", msg)
        })
        emitter.on("messageSent", (msg)=> {
            console.log( "Listener 2 got the message:", msg)
        })
        emitter.on("todoAdded", (inputValue)=>{
                let todoItem = document.createElement('h2');
                todoItem.innerText = inputValue
                let todoBox = document.body.querySelector('.todo-box');
                todoBox.appendChild(todoItem)
        })
        emitter.once("todoAdded", (msg) => {
            console.log("This will run only once:", msg);});
        emitter.emit("todoAdded", "task 1");
        emitter.emit("todoAdded", "task 2");

        emitter.emit("messageSent" , "hi uwu");

        function handleAddTodo(){
            let inputValue = document.body.querySelector('.input-box').value;
            emitter.emit('todoAdded', inputValue);

        }


    </script>
</body>
</html>
